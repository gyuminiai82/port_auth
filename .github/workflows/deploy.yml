name: Deploy to Production

on:
  push:
    branches:
      - master # 또는 배포를 원하는 브랜치명 (예: main)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: gyumini.iptime.org
          username: gyumin
          password: ${{ secrets.SERVER_PASSWORD }}
          # port: 22 # 기본 포트가 아니라면 포트 번호도 지정해야 합니다.
          script: |
            # 1. 프로젝트 폴더로 이동 (서버에 프로젝트가 clone 되어 있는 경로로 수정해주세요)
            cd /home/gyumin/port_auth
            
            # 2. 최신 코드 가져오기
            git pull origin master
            
            # 3. 환경 변수(.env) 파일 덮어쓰기 (필요시)
            # GitHub Secrets에 ENV_FILE이 제대로 설정되어 있지 않으면 빈 파일이 되어 서버가 터지므로 주석 처리합니다.
            # echo "${{ secrets.ENV_FILE }}" > .env
            
            # 4. 도커 컨테이너 빌드 및 재시작
            docker compose up -d --build
