name: Deploy port_auth

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            mkdir -p /home/${{ secrets.SERVER_USER }}/port_auth
            cd /home/${{ secrets.SERVER_USER }}/port_auth
            
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # Create .env file for backend
            echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}:5432/${{ secrets.DB_NAME }}" > .env
            echo "REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@${{ secrets.REDIS_HOST }}:6379/0" >> .env
            
            docker compose up -d --build
